services:
  mongodb:
    image: mongo:7.0.4
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo_data:/data/db

  product-service:
    build: .
    container_name: product-service
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DATABASE=product-db
      - MONGO_USERNAME=root
      - MONGO_PASSWORD=password
      - MONGO_AUTH_DB=admin
    depends_on:
      - mongodb

volumes:
  mongo_data: