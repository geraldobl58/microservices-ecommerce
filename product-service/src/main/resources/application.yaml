spring:
  application:
    name: product-service
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      host: ${MONGO_HOST:localhost}
      port: ${MONGO_PORT:27017}
      database: ${MONGO_DATABASE:product-db}
      username: ${MONGO_USERNAME:root}
      password: ${MONGO_PASSWORD:password}
      authentication-database: ${MONGO_AUTH_DB:admin}

server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: always
    include-stacktrace: never

logging:
  level:
    root: INFO
    com.eccomerce.product_service: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"

